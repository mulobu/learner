name: CI/CD (Fly.io)

on:
  pull_request:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/ci-cd-fly.yml"
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/ci-cd-fly.yml"
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check
        run: python -m compileall app

      - name: App import check
        run: python -c "from app.main import app; print(app.title)"

  deploy-fly:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs:
      - backend-ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    env:
      FLY_APP_NAME: learner-api
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      STORAGE_MODE: ${{ secrets.STORAGE_MODE }}
      CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
      AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN }}
      AUTH0_AUDIENCE: ${{ secrets.AUTH0_AUDIENCE }}
      AUTH0_ISSUER: ${{ secrets.AUTH0_ISSUER }}
      AUTH0_ADMIN_ROLE: ${{ secrets.AUTH0_ADMIN_ROLE }}
      AUTH0_ROLES_CLAIM: ${{ secrets.AUTH0_ROLES_CLAIM }}
      AUTH0_JWKS_CACHE_SECONDS: ${{ secrets.AUTH0_JWKS_CACHE_SECONDS }}
      AUTH0_USERINFO_TIMEOUT_SECONDS: ${{ secrets.AUTH0_USERINFO_TIMEOUT_SECONDS }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_MODEL: ${{ secrets.CLOUDFLARE_MODEL }}
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      LLM_RATE_LIMIT: ${{ secrets.LLM_RATE_LIMIT }}
      YOUTUBE_RATE_LIMIT: ${{ secrets.YOUTUBE_RATE_LIMIT }}
      MAX_FILE_SIZE_MB: ${{ secrets.MAX_FILE_SIZE_MB }}
      DEBUG: ${{ secrets.DEBUG }}
      APP_NAME: ${{ secrets.APP_NAME }}
      API_V1_PREFIX: ${{ secrets.API_V1_PREFIX }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail

          required=(
            FLY_API_TOKEN
            DATABASE_URL
            STORAGE_MODE
            CORS_ORIGINS
            AUTH0_DOMAIN
            AUTH0_AUDIENCE
            CLOUDFLARE_ACCOUNT_ID
            CLOUDFLARE_API_TOKEN
          )

          if [[ "${STORAGE_MODE}" == "r2" ]]; then
            required+=(
              R2_BUCKET_NAME
              R2_ENDPOINT_URL
              R2_ACCESS_KEY_ID
              R2_SECRET_ACCESS_KEY
            )
          fi

          missing=()
          for key in "${required[@]}"; do
            if [[ -z "${!key:-}" ]]; then
              missing+=("${key}")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            echo "Missing required GitHub Secrets: ${missing[*]}" >&2
            exit 1
          fi

      - name: Sync Fly secrets
        shell: bash
        run: |
          set -euo pipefail

          required_secret_names=(
            DATABASE_URL
            STORAGE_MODE
            CORS_ORIGINS
            AUTH0_DOMAIN
            AUTH0_AUDIENCE
            CLOUDFLARE_ACCOUNT_ID
            CLOUDFLARE_API_TOKEN
          )

          optional_secret_names=(
            AUTH0_ISSUER
            AUTH0_ADMIN_ROLE
            AUTH0_ROLES_CLAIM
            AUTH0_JWKS_CACHE_SECONDS
            AUTH0_USERINFO_TIMEOUT_SECONDS
            R2_BUCKET_NAME
            R2_ENDPOINT_URL
            R2_ACCESS_KEY_ID
            R2_SECRET_ACCESS_KEY
            CLOUDFLARE_MODEL
            YOUTUBE_API_KEY
            LLM_RATE_LIMIT
            YOUTUBE_RATE_LIMIT
            MAX_FILE_SIZE_MB
            DEBUG
            APP_NAME
            API_V1_PREFIX
          )

          secret_args=()
          for key in "${required_secret_names[@]}"; do
            secret_args+=("${key}=${!key}")
          done
          for key in "${optional_secret_names[@]}"; do
            value="${!key:-}"
            if [[ -n "${value}" ]]; then
              secret_args+=("${key}=${value}")
            fi
          done

          flyctl secrets set "${secret_args[@]}" --app "${FLY_APP_NAME}" --stage

      - name: Deploy
        working-directory: backend
        run: |
          flyctl deploy \
            --config fly.toml \
            --dockerfile Dockerfile \
            --app "${FLY_APP_NAME}" \
            --remote-only
