services:
  db:
    image: postgres:16-alpine
    container_name: learner-db
    environment:
      POSTGRES_USER: learner
      POSTGRES_PASSWORD: learner
      POSTGRES_DB: learner
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U learner"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
